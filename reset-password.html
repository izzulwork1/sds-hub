<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#102a43">
  <meta name="robots" content="noindex, nofollow">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; connect-src 'self' https://jxvsxwsmfycvewxeyxmp.supabase.co; font-src 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: blob:; object-src 'none'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self'; worker-src 'self' blob:">
  <title>Reset password · SDS Intake</title>
  <link rel="icon" href="./assets/icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="./assets/admin.css">
  <script src="./assets/config.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.min.js" defer></script>
  <script type="module" src="./assets/reset-password.js"></script>
</head>
<body>
  <header class="admin-header">
    <a class="admin-brand" href="./admin.html">
      <img src="./assets/icon.svg" alt="">
      <span><strong>SDS Intake Control</strong><small>Password reset</small></span>
    </a>
  </header>
  <main class="admin-main reset-main">
    <section class="connection-panel login-panel reset-panel">
      <div>
        <h1>Set a new password</h1>
        <p>Enter a new password for your EHS administrator account. This reset link is single-use and time-limited; open this page from the link in your email.</p>
      </div>
      <form id="resetForm" class="connection-fields">
        <label>New password<input id="newPasswordInput" type="password" minlength="8" autocomplete="new-password" required></label>
        <label>Confirm new password<input id="confirmPasswordInput" type="password" minlength="8" autocomplete="new-password" required></label>
        <button id="resetButton" class="primary-action" type="submit">Update password</button>
        <p id="resetError" class="login-error" role="alert" hidden></p>
        <p id="resetNotice" class="login-notice" role="status" hidden></p>
        <a class="link-button" href="./admin.html">Back to login</a>
      </form>
    </section>
  </main>
</body>
</html>
